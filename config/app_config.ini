[DEFAULT]
# Configuration par défaut de TelVid-Vizane

[APPLICATION]
name = TelVid-Vizane
version = 1.0.0
debug = false
log_level = INFO
data_dir = ./data
temp_dir = ./temp
max_concurrent_downloads = 3

[GUI]
theme = dark
color_theme = dark-blue
window_width = 900
window_height = 750
min_width = 800
min_height = 650
icon_size = 28
font_family = Segoe UI
font_size = 12

[DOWNLOAD]
default_output_path = ~/Downloads
max_retries = 3
timeout = 30
chunk_size = 1024
user_agent = TelVid-Vizane/1.0.0
max_file_size_mb = 2048
supported_formats = mp4,mkv,avi,mov,webm,mp3,m4a,wav,flac

[PREMIUM]
trial_period_days = 7
max_free_downloads = 10
license_check_interval = 3600
payment_timeout = 300
supported_payment_methods = lumicash,mobile_money,paypal

[SECURITY]
encrypt_license = true
hash_algorithm = sha256
license_validation_url = https://api.telvid-vizane.com/validate
update_check_url = https://api.telvid-vizane.com/update
telemetry_enabled = false

[LOGGING]
log_to_file = true
log_to_console = true
max_log_size_mb = 10
log_backup_count = 5
log_format = detailed

[NETWORK]
connection_timeout = 10
read_timeout = 30
max_redirects = 5
verify_ssl = true
proxy_enabled = false
proxy_host = 
proxy_port = 
proxy_username = 
proxy_password = 

[PERFORMANCE]
max_memory_usage_mb = 512
cleanup_temp_files = true
cache_enabled = true
cache_size_mb = 100
preload_thumbnails = false

[UPDATES]
auto_check_updates = true
check_interval_hours = 24
beta_updates = false
update_channel = stable

[LOCALIZATION]
language = fr
date_format = %d/%m/%Y
time_format = %H:%M:%S
currency = XOF
