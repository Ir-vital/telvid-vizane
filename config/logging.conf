[loggers]
keys=root,app,downloader,license,gui

[handlers]
keys=consoleHandler,fileHandler,downloadHandler,licenseHandler

[formatters]
keys=simpleFormatter,detailedFormatter

[logger_root]
level=INFO
handlers=consoleHandler,fileHandler

[logger_app]
level=INFO
handlers=consoleHandler,fileHandler
qualname=app
propagate=0

[logger_downloader]
level=INFO
handlers=consoleHandler,downloadHandler
qualname=downloader
propagate=0

[logger_license]
level=INFO
handlers=consoleHandler,licenseHandler
qualname=license
propagate=0

[logger_gui]
level=INFO
handlers=consoleHandler,fileHandler
qualname=gui
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=INFO
formatter=simpleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=detailedFormatter
args=('logs/app.log', 'a', 10485760, 5, 'utf-8')

[handler_downloadHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=detailedFormatter
args=('logs/download.log', 'a', 10485760, 3, 'utf-8')

[handler_licenseHandler]
class=handlers.RotatingFileHandler
level=INFO
formatter=detailedFormatter
args=('logs/license.log', 'a', 5242880, 3, 'utf-8')

[formatter_simpleFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_detailedFormatter]
format=%(asctime)s - %(name)s - %(levelname)s - %(filename)s:%(lineno)d - %(funcName)s() - %(message)s
datefmt=%Y-%m-%d %H:%M:%S
